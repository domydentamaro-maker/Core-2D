            <h1 class="text-4xl font-bold mb-6">Glossario Immobiliare</h1>
            <p class="text-lg mb-8">
                Dizionario specializzato di termini immobiliari, edilizi e normativi. Scopri il significato dei termini chiave del settore.
            </p>
            
            <div class="space-y-6">
                <div>
                    <h3 class="text-xl font-semibold">ZES (Zona Economica Speciale)</h3>
                    <p>Area geografica con agevolazioni fiscali e normative specifiche per incentivare investimenti e sviluppo economico.</p>
                </div>
                
                <div>
                    <h3 class="text-xl font-semibold">Cubatura</h3>
                    <p>Volume complessivo di un edificio, espresso in metri cubi. Determinato moltiplicando la superficie per l'altezza.</p>
                </div>
                
                <div>
                    <h3 class="text-xl font-semibold">Metratura</h3>
                    <p>Superficie totale di un immobile, espressa in metri quadri. Include la superficie utile e quella coperta.</p>
                </div>
                
                <div>
                    <h3 class="text-xl font-semibold">Lotto Edificabile</h3>
                    <p>Terreno idoneo per la realizzazione di edifici secondo le normative urbanistiche e edilizie locali.</p>
                </div>
                
                <div>
                    <h3 class="text-xl font-semibold">Valorizzazione Suoli</h3>
                    <p>Processo di aumento del valore di un terreno attraverso interventi di bonifica, rigenerazione o sviluppo.</p>
                </div>
                
                <div>
                    <h3 class="text-xl font-semibold">Permesso di Costruire</h3>
                    <p>Autorizzazione amministrativa necessaria per realizzare opere edilizie. Rilasciato dal Comune competente.</p>
                </div>
                
                <div>
                    <h3 class="text-xl font-semibold">PRG (Piano Regolatore Generale)</h3>
                    <p>Strumento urbanistico che definisce l'assetto territoriale e le destinazioni d'uso dei suoli di un comune.</p>
                </div>
            </div>
