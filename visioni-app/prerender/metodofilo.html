            <h1 class="text-4xl font-bold mb-6">Metodo F.I.L.O.™ — Sviluppo Immobiliare Domenico Dentamaro</h1>
            <p class="text-lg mb-4">
                Il <strong>Metodo F.I.L.O.™</strong> è la metodologia operativa proprietaria ideata da <strong>Domenico Dentamaro</strong>
                per trasformare terreni inattivi in asset immobiliari di valore a Bari e in Puglia.
                L'acronimo rappresenta le 4 fasi del ciclo: <strong>Fusione · Innesco · Latenza · Orchestrazione</strong>.
            </p>
            
            <h2 class="text-2xl font-semibold mt-8 mb-4">Le 4 Fasi del Metodo F.I.L.O.™</h2>
            
            <h3 class="text-xl font-semibold mt-6 mb-2">Fase 1 — Fusione: Analisi e Fattibilità</h3>
            <p>Sintesi delle variabili territoriali, urbanistiche e di mercato. Analisi catastale, due diligence legale preliminare,
            studio dei vincoli paesaggistici e prima stima del valore a trasformazione (VaT).</p>
            
            <h3 class="text-xl font-semibold mt-6 mb-2">Fase 2 — Innesco: Attivazione delle Leve</h3>
            <p>Strutturazione del veicolo finanziario (SPV, equity, debito), selezione e contrattualizzazione dei partner tecnici,
            avvio delle pratiche autorizzative, progettazione preliminare e definitiva.</p>
            
            <h3 class="text-xl font-semibold mt-6 mb-2">Fase 3 — Latenza: Maturazione Strategica</h3>
            <p>Monitoraggio dell'iter autorizzativo, analisi continuativa del mercato, ottimizzazione del progetto durante l'attesa,
            strategia di pre-commercializzazione dell'asset, gestione finanziaria del periodo intercorrente.</p>
            
            <h3 class="text-xl font-semibold mt-6 mb-2">Fase 4 — Orchestrazione: Esecuzione Coordinata</h3>
            <p>Direzione lavori e supervisione cantieristica, coordinamento di costruttori, commercializzatori, notai e finanziatori,
            closing notarile e report finale di performance e ROI.</p>
            
            <h2 class="text-2xl font-semibold mt-8 mb-4">Manuale Avanzato F.I.L.O.™</h2>
            <p>Disponibile il <a href="https://www.2dsviluppoimmobiliare.it/metodofilo/manuale.html">Manuale Avanzato del Metodo F.I.L.O.™</a>:
            oltre 80 pagine di framework operativo, checklist, strumenti di analisi e casi studio reali in Puglia.
            Pubblicato anche su <a href="https://www.slideshare.net/domenico-dentamaro">SlideShare</a> e
            <a href="https://medium.com/@domenico-dentamaro">Medium</a>.</p>
            
            <h2 class="text-2xl font-semibold mt-8 mb-4">Territorio di Applicazione</h2>
            <ul class="list-disc list-inside space-y-2">
                <li><strong>Bari e Provincia:</strong> Comuni strategici — Ceglie del Campo, Modugno, Triggiano, Binetto, Acquaviva</li>
                <li><strong>Puglia:</strong> Sviluppo residenziale, commerciale e industriale</li>
                <li><strong>ZES Puglia:</strong> Investimenti agevolati — <a href="https://www.2dsviluppoimmobiliare.it/zes/">scopri la ZES</a></li>
